name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ['8.4', '8.5']
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

            - name: Setup PHP ${{ matrix.php }}
              uses: shivammathur/setup-php@728c6c6b8cf02c2e48117716a91ee48313958a19 # v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none
                  tools: composer:v2

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Audit dependencies
              run: composer audit

            - name: Format check
              run: composer format:check

            - name: Static analysis
              run: composer phpstan

            - name: Tests
              run: composer test

    # Aggregate check tracked by the town-crier trial (TC-0069) — intended as the
    # single required status check (the check (8.4)/(8.5) matrix legs stop being
    # individually required once branch protection swaps to this aggregate).
    ci-passed:
        name: ci-passed
        runs-on: ubuntu-latest
        needs: [check]
        if: always()
        steps:
            - name: Verify all lanes passed
              if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
              run: |
                  echo "One or more CI lanes did not pass."
                  exit 1
